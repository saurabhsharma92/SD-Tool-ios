Neither primary nor fallback OUT_DIR is writable.\"\n    echo \"Please check build sandboxing or choose another staging location.\"\n    exit 1\n  }\nfi\n\necho \"Using OUT_DIR=${OUT_DIR}\"\necho \"Using FILELIST=${FILELIST}\"\n\necho \"Listing OUT_DIR parent:\"\n/bin/ls -la \"$(dirname \"${OUT_DIR}\")\" || true\necho \"Listing OUT_DIR:\"\n/bin/ls -la \"${OUT_DIR}\" || true\n\n# If no SourceDocs, produce an empty file list and exit gracefully\nif [ ! -d \"${SOURCE}\" ]; then\n  echo \"No SourceDocs at ${SOURCE}; writing empty file list.\"\n  : > \"${FILELIST}\"\n  echo \"Wrote empty file list at ${FILELIST}\"\n  exit 0\nfi\n\necho \"Listing SOURCE:\"\n/bin/ls -la \"${SOURCE}\" || true\n\n# Pre-gzip all .md files\nfound_any=false\nfor f in \"${SOURCE}\"/*.md(.N); do\n  if [ -e \"$f\" ]; then\n    found_any=true\n    base=\"$(basename \"$f\")\"\n    out=\"${OUT_DIR}/${base}.gz\"\n    echo \"Pre-gzipping ${f} -> ${out}\"\n    /usr/bin/gzip -c \"$f\" > \"$out\"\n  fi\ndone\n\necho \"Listing OUT_DIR after gzip:\"\n/bin/ls -la \"${OUT_DIR}\" || true\n\n# Generate the xcfilelist for the Copy Files phase\n: > \"${FILELIST}\"\nfor gz in \"${OUT_DIR}\"/*.gz(.N); do\n  [ -e \"$gz\" ] && echo \"$gz\" >> \"${FILELIST}\"\ndone\n\necho \"==== FILELIST CONTENTS (${FILELIST}) ====\"\n/bin/cat \"${FILELIST}\" || true\necho \"==== END FILELIST CONTENTS ====\"\n\nif [ \"$found_any\" = false ]; then\n  echo \"No .md files found in ${SOURCE}; wrote empty file list.\"\nfi\n\necho \"Pre-gzip complete.\"\n";
